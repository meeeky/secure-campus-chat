<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat — Secured Room</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .chat-container { width: 100%; max-width: 550px; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #2d2d2d; }
        h2 { margin-top: 0; color: #ffffff; display: flex; align-items: center; gap: 8px; font-size: 22px; }
        .room-tag { background: #00bcd4; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .info-panel { font-size: 13px; color: #aaaaaa; background: #151515; padding: 12px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #00bcd4; }
        .share-url { font-family: monospace; color: #00bcd4; word-break: break-all; select-all: true; user-select: all; background: #252525; padding: 4px; border-radius: 3px; display: block; margin-top: 5px; }
        #chat-stream { height: 320px; border: 1px solid #2d2d2d; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #161616; border-radius: 6px; }
        .input-wrapper { display: flex; gap: 8px; }
        input[type="text"] { flex-grow: 1; padding: 12px; background: #2d2d2d; color: #fff; border: 1px solid #3d3d3d; border-radius: 6px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #00bcd4; }
        button { padding: 0 24px; background: #00bcd4; border: none; border-radius: 6px; cursor: pointer; color: #121212; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #00acc1; }
        .sys-log { color: #777777; font-style: italic; text-align: center; margin: 8px 0; font-size: 13px; }
        .msg-line { margin-bottom: 10px; line-height: 1.4; word-break: break-word; }
        .msg-line b { color: #00bcd4; }
        .msg-line.self b { color: #81c784; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🔒 E2EE Chat Hub <span id="room-id-tag" class="room-tag"></span></h2>
    <div class="info-panel">
        🤝 <b>Private Invite Link:</b> Share this entire URL with your peer. The system password follows the # symbol and is completely hidden from the server.
        <span id="share-link-display" class="share-url"></span>
    </div>
    
    <div id="chat-stream"></div>

    <div class="input-wrapper">
        <input type="text" id="msg-input" placeholder="Type a secure message..." autocomplete="off" maxlength="1000">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const socket = io();
    const roomId = "{{ room_id }}";
    document.getElementById('room-id-tag').textContent = roomId;

    // CLIENT-SIDE HASH KEY GENERATION
    // Extracts or injects a local symmetric encryption passphrase securely into the client URI state
    if (!window.location.hash) {
        window.location.hash = Math.random().toString(36).substring(2, 12);
    }
    const cryptoSecretKey = window.location.hash.substring(1); 
    
    // Output full navigation coordinate for the secondary peer
    document.getElementById('share-link-display').textContent = window.location.href;

    // Command the websocket gateway to assign client to the target room stream
    socket.emit('join', { room: roomId });

    const chatStream = document.getElementById('chat-stream');
    const msgInput = document.getElementById('msg-input');

    function logToStream(sender, text, type = 'normal') {
        const el = document.createElement('div');
        if (type === 'sys') {
            el.className = 'sys-log';
            el.textContent = text;
        } else {
            el.className = `msg-line ${type}`;
            el.innerHTML = `<b>${sender}:</b> ${text}`;
        }
        chatStream.appendChild(el);
        chatStream.scrollTop = chatStream.scrollHeight;
    }

    // Capture standard sync events
    socket.on('status', (data) => logToStream(null, data.msg, 'sys'));

    // Intercept outbound payload channels
    socket.on('receive_secure_msg', (data) => {
        try {
            // Local client decrypt loop execution via Crypto-JS AES primitive
            const structuralBytes = CryptoJS.AES.decrypt(data.payload, cryptoSecretKey);
            const decryptedPlaintext = structuralBytes.toString(CryptoJS.enc.Utf8);
            
            if (decryptedPlaintext) {
                logToStream("Peer", decryptedPlaintext, 'peer');
            } else {
                logToStream(null, "⚠️ Scrambled data received. Authentication key mismatch.", 'sys');
            }
        } catch(err) {
            logToStream(null, "⚠️ Cryptographic processing error parsing payload packet.", 'sys');
        }
    });

    function dispatchSecurePayload() {
        const payloadText = msgInput.value.trim();
        if (!payloadText) return;

        logToStream("You", payloadText, 'self');

        // Execute local symmetric key translation
        const ciphertextTextString = CryptoJS.AES.encrypt(payloadText, cryptoSecretKey).toString();

        // Broadcast completely unreadable ciphertext to the communication thread
        socket.emit('secure_msg', { room: roomId, payload: ciphertextTextString });
        msgInput.value = '';
    }

    document.getElementById('send-btn').addEventListener('click', dispatchSecurePayload);
    msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') dispatchSecurePayload(); });
    let idleTimer;
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        // 10 minutes in milliseconds
        idleTimer = setTimeout(() => {
            socket.disconnect(); // Hard drop the socket connection to save server bandwidth
            logToStream(null, "💤 Disconnected due to 10 minutes of inactivity. Refresh to rejoin.", "sys");
            document.getElementById('msg-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
        }, 600000); 
    }

    // Watch for user interactions to keep them active
    window.onload = resetIdleTimer;
    document.onmousemove = resetIdleTimer;
    document.onkeydown = resetIdleTimer;
    
</script>
</body>
</html>
